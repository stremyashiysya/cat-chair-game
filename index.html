<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Котик в офисе 🐱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#111;overflow:hidden;touch-action:none}
body{display:flex;align-items:center;justify-content:center}
#wrap{position:absolute;width:800px;height:600px;transform-origin:top left}
canvas{display:block}
#ui{position:absolute;inset:0;pointer-events:none}
#counter{position:absolute;top:14px;left:16px;color:#fff;font:bold 22px/1 Arial;
  text-shadow:0 0 12px rgba(255,160,40,.9),0 2px 4px rgba(0,0,0,.9)}
#status{position:absolute;top:44px;left:16px;color:rgba(255,255,255,.75);
  font:13px Arial;text-shadow:0 1px 3px rgba(0,0,0,.9)}
#charge-ui{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);
  text-align:center;display:none;pointer-events:none}
#charge-ring{width:80px;height:80px;margin:0 auto 4px}
#charge-pct{color:#fff;font:bold 14px Arial;text-shadow:0 1px 3px #000}
#btn-reset{position:absolute;bottom:14px;right:14px;padding:10px 20px;
  background:rgba(0,0,0,.65);color:#fff;border:2px solid rgba(255,255,255,.35);
  border-radius:14px;font:14px Arial;cursor:pointer;pointer-events:all;
  backdrop-filter:blur(8px);transition:all .15s;-webkit-tap-highlight-color:transparent}
#btn-reset:hover{background:rgba(255,255,255,.15)}
#btn-reset:active{transform:scale(.95)}
#tooltip{position:absolute;background:rgba(0,0,0,.75);color:#fff;
  padding:4px 10px;border-radius:8px;font:12px Arial;pointer-events:none;
  display:none;z-index:10;white-space:nowrap;transform:translate(-50%,-110%)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <svg id="charge-ring-svg" style="display:none;position:absolute;width:80px;height:80px"></svg>
  <div id="ui">
    <div id="counter">💥 0</div>
    <div id="status">Кликни на предмет!</div>
    <div id="charge-ui">
      <svg id="cring" width="80" height="80">
        <circle cx="40" cy="40" r="32" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="6"/>
        <circle id="carc" cx="40" cy="40" r="32" fill="none" stroke="#44ff66"
          stroke-width="6" stroke-linecap="round"
          stroke-dasharray="201" stroke-dashoffset="201"
          transform="rotate(-90 40 40)"/>
      </svg>
      <div id="charge-pct">0%</div>
    </div>
    <button id="btn-reset">🔄 Привести в порядок</button>
    <div id="tooltip"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const W=800, H=600;
const VP = {x:400, y:95};   // vanishing point
const GRAVITY=920, BOUNCE=0.50, FRICTION=0.78;
const FLOOR=H-22, WALL_L=15, WALL_R=W-15;
const CAT_HOME={x:295, y:400};
const CAT_SPEED=220;  // px/s

// ═══════════════════════════════════════════
// FIT
// ═══════════════════════════════════════════
const wrap=document.getElementById('wrap');
function fit(){
  const s=Math.min(innerWidth/W, innerHeight/H);
  wrap.style.transform=`scale(${s})`;
  wrap.style.left=((innerWidth-W*s)/2)+'px';
  wrap.style.top=((innerHeight-H*s)/2)+'px';
}
fit(); addEventListener('resize',fit);

// ═══════════════════════════════════════════
// PIXI
// ═══════════════════════════════════════════
const app=new PIXI.Application({view:document.getElementById('c'),
  width:W,height:H,backgroundColor:0x2a3038,antialias:true,resolution:1});
const lBg=new PIXI.Container(), lObjs=new PIXI.Container(),
      lCat=new PIXI.Container(), lFly=new PIXI.Container(),
      lFx=new PIXI.Container();
app.stage.addChild(lBg,lObjs,lCat,lFly,lFx);

// ═══════════════════════════════════════════
// COLOR HELPERS
// ═══════════════════════════════════════════
const dk=(c,f)=>(Math.round(((c>>16)&255)*f)<<16)|(Math.round(((c>>8)&255)*f)<<8)|Math.round((c&255)*f);
const lt=(c,f)=>(Math.min(255,Math.round(((c>>16)&255)*f))<<16)|(Math.min(255,Math.round(((c>>8)&255)*f))<<8)|Math.min(255,Math.round((c&255)*f));

// ═══════════════════════════════════════════
// OFFICE BACKGROUND
// Matches sticker: grey office, blue-grey floor,
// desks, window with blinds, filing cabinets
// ═══════════════════════════════════════════
function drawOffice(g){
  g.clear();

  // Sky/ceiling strip
  g.beginFill(0xd8dcdc); g.drawRect(0,0,W,VP.y+20); g.endFill();
  // Ceiling panels
  g.beginFill(0xcdd2d2);
  for(let x=0;x<W;x+=120) g.drawRect(x,0,110,VP.y+18);
  g.endFill();
  // Fluorescent lights
  g.beginFill(0xf4f8e0,0.9);
  [130,400,670].forEach(lx=>g.drawRoundedRect(lx-60,4,120,14,3));
  g.endFill();
  g.beginFill(0xffffff,0.5);
  [130,400,670].forEach(lx=>g.drawRoundedRect(lx-56,6,112,4,2));
  g.endFill();

  // Left wall (window side)
  g.beginFill(0xc8cece);
  g.drawRect(0,VP.y+18,180,H-VP.y-18); g.endFill();

  // Back wall
  g.beginFill(0xd0d5d5);
  g.drawRect(0,VP.y+18,W,160); g.endFill();

  // Floor (blue-grey linoleum, perspective lines)
  const floorY=VP.y+95;
  g.beginFill(0xa8b8c4);
  g.drawRect(0,floorY,W,H-floorY); g.endFill();
  // Floor tiles
  g.lineStyle(1,0x8898a8,0.4);
  for(let row=0;row<8;row++){
    const y=floorY+row*65;
    const alpha=0.15+row*0.04;
    // horizontal
    g.lineStyle(1,0x7a8a9a,alpha);
    g.moveTo(0,y); g.lineTo(W,y);
  }
  // vertical perspective lines
  for(let col=-3;col<=10;col++){
    const bx=col*(W/8);
    g.lineStyle(1,0x7a8a9a,0.2);
    g.moveTo(VP.x+(bx-VP.x)*0.1,floorY);
    g.lineTo(bx,H);
  }
  g.lineStyle(0);

  // ─── WINDOW (left wall) ───
  const wx=18, wy=VP.y+25, ww=130, wh=120;
  g.beginFill(0xaaccee,0.55); g.drawRect(wx,wy,ww,wh); g.endFill();
  // Window frame
  g.lineStyle(5,0x888888); g.drawRect(wx,wy,ww,wh); g.lineStyle(0);
  g.lineStyle(3,0x888888);
  g.moveTo(wx+ww/2,wy); g.lineTo(wx+ww/2,wy+wh);
  g.moveTo(wx,wy+wh/2); g.lineTo(wx+ww,wy+wh/2);
  g.lineStyle(0);
  // Blinds
  g.lineStyle(2,0xd0ccc0,0.85);
  for(let i=0;i<10;i++){
    const by=wy+i*(wh/10)+2;
    g.moveTo(wx+2,by); g.lineTo(wx+ww-2,by);
  }
  g.lineStyle(0);
  // Blind cord
  g.lineStyle(1.5,0xaaaaaa);
  g.moveTo(wx+ww-20,wy); g.lineTo(wx+ww-20,wy+wh+30);
  g.lineStyle(0);

  // ─── BACKGROUND DESKS (right area, smaller = farther) ───
  [
    {x:480,y:180,w:260,h:28,depth:18},
    {x:490,y:220,w:240,h:26,depth:16},
  ].forEach(d=>{
    g.beginFill(0x585858); g.drawRect(d.x,d.y,d.w,d.h); g.endFill();
    g.beginFill(0x404040); g.drawRect(d.x,d.y+d.h,d.w,d.depth); g.endFill();
    g.beginFill(0x686868); g.drawRect(d.x,d.y,d.w,4); g.endFill();
    // monitors on back desks
    [d.x+30, d.x+140].forEach(mx=>{
      g.beginFill(0x1a1a22); g.drawRoundedRect(mx,d.y-42,34,40,3); g.endFill();
      g.beginFill(0x1e3a88); g.drawRect(mx+3,d.y-39,28,30); g.endFill();
      g.beginFill(0x282828); g.drawRect(mx+12,d.y-2,10,6); g.endFill();
      g.beginFill(0x333333); g.drawRoundedRect(mx+6,d.y+4,22,4,2); g.endFill();
    });
  });

  // ─── FILING CABINET (right wall area) ───
  const cx=668, cy=208, cw=68, ch=168;
  g.beginFill(0x909898); g.drawRoundedRect(cx,cy,cw,ch,3); g.endFill();
  g.beginFill(0xb0b8b8); g.drawRoundedRect(cx,cy,cw,5,2); g.endFill();
  g.beginFill(0x787e7e); g.drawRoundedRect(cx,cy,4,ch,2); g.endFill();
  [0.22,0.46,0.68,0.88].forEach(t=>{
    const dy=cy+ch*t;
    g.lineStyle(2,0x787e7e,0.9); g.drawRoundedRect(cx+4,dy,cw-8,ch*0.17,2); g.lineStyle(0);
    g.beginFill(0xd0d8d8,0.8); g.drawRoundedRect(cx+cw/2-8,dy+ch*0.06,16,5,3); g.endFill();
  });

  // ─── MAIN DESK (foreground center-left) ───
  // Desk top surface - perspective quad
  const dTL={x:62,y:315}, dTR={x:550,y:290},
        dBL={x:62,y:410}, dBR={x:550,y:385};
  // Top surface (dark grey)
  g.beginFill(0x525252);
  g.moveTo(dTL.x,dTL.y); g.lineTo(dTR.x,dTR.y);
  g.lineTo(dBR.x,dBR.y); g.lineTo(dBL.x,dBL.y);
  g.closePath(); g.endFill();
  // Surface highlight strip
  g.beginFill(0x646464);
  g.moveTo(dTL.x,dTL.y); g.lineTo(dTR.x,dTR.y);
  g.lineTo(dTR.x,dTR.y+6); g.lineTo(dTL.x,dTL.y+6);
  g.closePath(); g.endFill();
  // Front face
  g.beginFill(0x3c3c3c);
  g.moveTo(dBL.x,dBL.y); g.lineTo(dBR.x,dBR.y);
  g.lineTo(dBR.x,dBR.y+52); g.lineTo(dBL.x,dBL.y+52);
  g.closePath(); g.endFill();
  // Desk legs
  g.beginFill(0x303030);
  [[dBL.x+8,dBL.y+48],[dBR.x-18,dBR.y+48]].forEach(([lx,ly])=>{
    g.drawRect(lx,ly,12,H-ly-10);
  });
  g.endFill();
  // Mousepad on desk
  g.beginFill(0x1a1a22); g.drawRoundedRect(376,348,100,68,6); g.endFill();
  g.beginFill(0x222228); g.drawRoundedRect(378,350,96,64,5); g.endFill();

  // ─── UNDER-DESK AREA (hint of darkness) ───
  g.beginFill(0x1a1a1a,0.4);
  g.moveTo(dBL.x,dBL.y+52); g.lineTo(dBR.x,dBR.y+52);
  g.lineTo(dBR.x,dBR.y+90); g.lineTo(dBL.x,dBL.y+90);
  g.closePath(); g.endFill();

  // Wall-floor junction line
  g.lineStyle(3,0x8898a8,0.5);
  g.moveTo(0,floorY); g.lineTo(W,floorY); g.lineStyle(0);
}

const bgGfx=new PIXI.Graphics();
drawOffice(bgGfx);
lBg.addChild(bgGfx);

// ═══════════════════════════════════════════
// CAT CHARACTER
// Chibi anime cat matching the sticker:
// blonde/cream body, purple jacket, red bow, yellow tail
// ═══════════════════════════════════════════
const CC={  // cat colors
  cream:0xF5E0A0, creamD:0xDDC070, creamL:0xFFF0C8,
  jacket:0x6040A8, jacketD:0x402880, jacketH:0x8060C8,
  bow:0xCC2244, bowD:0xAA1133,
  tail:0xF0C030, tailD:0xC89820,
  eye:0xE09018, eyeD:0xA06010,
  pupil:0x111111, white:0xFFFFFF,
  nose:0xFFB0A0, cheek:0xFF8888,
  black:0x111111, darkEar:0x2a2a2a,
};

function drawCat(g, pose, phase, chargeR, flip){
  g.clear();
  const fx=flip?-1:1;  // x-flip factor
  const P=pose, t=phase;

  // ── TAIL (behind body) ──
  // Curved tail drawn as filled bezier approximation
  g.beginFill(CC.tail);
  const tailPts=[];
  const ts=12; // segments
  for(let i=0;i<=ts;i++){
    const p=i/ts;
    const tx=fx*(18+p*35+Math.sin(p*Math.PI)*18);
    const ty=-20-p*38+Math.cos(p*Math.PI*1.5)*(10+p*8);
    tailPts.push(tx,ty);
  }
  for(let i=ts;i>=0;i--){
    const p=i/ts;
    const tx=fx*(18+p*35+Math.sin(p*Math.PI)*18);
    const ty=-16-p*38+Math.cos(p*Math.PI*1.5)*(10+p*8);
    tailPts.push(tx,ty);
  }
  g.drawPolygon(tailPts); g.endFill();
  // Tail tip
  g.beginFill(CC.tailD);
  const ttx=fx*(18+35+Math.sin(Math.PI)*18), tty=-20-38;
  g.drawCircle(fx*50,-58,8); g.endFill();
  g.beginFill(CC.tail); g.drawCircle(fx*48,-60,5); g.endFill();

  // ── LEGS ──
  let legL=0, legR=0;  // offset Y for walk animation
  if(P==='walk'){
    legL=Math.sin(t)*10;
    legR=Math.sin(t+Math.PI)*10;
  }
  // Left leg
  g.beginFill(CC.jacket);
  g.drawRoundedRect(fx*(-14)-2,  -22+legL, 12, 22, 5); g.endFill();
  // Right leg
  g.beginFill(CC.jacketD);
  g.drawRoundedRect(fx*(2),      -22+legR, 12, 22, 5); g.endFill();
  // Paws
  g.beginFill(CC.cream);
  g.drawEllipse(fx*(-8), legL,   7, 5); // left paw
  g.drawEllipse(fx*(8),  legR,   7, 5); // right paw
  g.endFill();

  // ── BODY (purple jacket) ──
  g.beginFill(CC.jacket);
  g.drawRoundedRect(-17,-56,34,36,9); g.endFill();
  // Jacket highlight
  g.beginFill(CC.jacketH,0.2);
  g.drawRoundedRect(-17,-56,34,8,9); g.endFill();
  // Jacket lapels
  g.beginFill(CC.white,0.15);
  g.moveTo(fx*(-3),-56); g.lineTo(fx*(-12),-42); g.lineTo(fx*(-3),-36); g.closePath(); g.endFill();

  // ── BOW TIE ──
  g.beginFill(CC.bow);
  g.moveTo(fx*(-7),-44); g.lineTo(fx*(0),-40); g.lineTo(fx*(-7),-36); g.lineTo(fx*(-12),-40); g.closePath();
  g.moveTo(fx*(7),-44);  g.lineTo(fx*(0),-40); g.lineTo(fx*(7),-36);  g.lineTo(fx*(12),-40);  g.closePath();
  g.endFill();
  g.beginFill(CC.bowD); g.drawCircle(0,-40,4); g.endFill();
  g.beginFill(CC.bow,0.8); g.drawCircle(0,-40,2.5); g.endFill();

  // ── ARMS ──
  let armRot=0, armRaise=0;
  if(P==='hit'){
    // Right arm swings
    armRot=Math.sin(t*2)*(Math.PI*0.55+chargeR*0.4);
    armRaise=Math.abs(Math.sin(t*2))*20*(1+chargeR);
  } else if(P==='throw'){
    armRot=-Math.PI*0.5;
    armRaise=24;
  } else if(P==='celebrate'){
    armRaise=Math.sin(t)*18+20;
  }

  // Left arm (mostly static)
  g.beginFill(CC.jacket);
  g.drawRoundedRect(fx*(-24),-58, 9, 24, 4); g.endFill();
  g.beginFill(CC.cream); g.drawEllipse(fx*(-20),-34+2, 6,5); g.endFill();

  // Right arm (animated)
  // Draw rotated arm
  const armX=fx*15, armBaseY=-56;
  const armLen=26, armW=9;
  const cosA=Math.cos(flip ? Math.PI-armRot : armRot);
  const sinA=Math.sin(flip ? Math.PI-armRot : armRot);
  g.beginFill(CC.jacketD);
  const arm=[
    [armX-armW/2*cosA, armBaseY-armRaise - armW/2*sinA],
    [armX+armW/2*cosA, armBaseY-armRaise + armW/2*sinA],
    [armX+armW/2*cosA + armLen*sinA, armBaseY-armRaise + armLen*(-cosA) + armW/2*sinA],
    [armX-armW/2*cosA + armLen*sinA, armBaseY-armRaise + armLen*(-cosA) - armW/2*sinA],
  ];
  g.drawPolygon(arm.flat()); g.endFill();
  // Paw
  const pawX=armX + armLen*sinA;
  const pawY=armBaseY-armRaise + armLen*(-cosA);
  g.beginFill(CC.cream); g.drawCircle(pawX, pawY, 6); g.endFill();

  // ── HEAD ──
  // Shadow
  g.beginFill(CC.creamD); g.drawCircle(1,-75,23); g.endFill();
  // Main head
  g.beginFill(CC.cream); g.drawCircle(0,-76,22); g.endFill();

  // Ear bases
  g.beginFill(CC.cream);
  g.drawPolygon([fx*(-22),-85, fx*(-13),-102, fx*(-4),-85]);
  g.drawPolygon([fx*(22),-85, fx*(13),-102, fx*(4),-85]);
  g.endFill();
  // Ear dark tips
  g.beginFill(CC.darkEar);
  g.drawPolygon([fx*(-20),-87, fx*(-13),-99, fx*(-6),-87]);
  g.drawPolygon([fx*(20),-87, fx*(13),-99, fx*(6),-87]);
  g.endFill();
  // Ear inner pink
  g.beginFill(CC.nose,0.5);
  g.drawPolygon([fx*(-19),-88, fx*(-13),-96, fx*(-8),-88]);
  g.drawPolygon([fx*(19),-88, fx*(13),-96, fx*(8),-88]);
  g.endFill();

  // Eyes - expression changes by pose
  let eyeH=9, pupilH=7, eyeOffY=0;
  if(P==='hit'||P==='throw'){
    eyeH=6; pupilH=5; eyeOffY=1; // squinted when angry/concentrated
  }
  if(P==='celebrate'){ eyeH=10; }

  // Eye whites
  g.beginFill(CC.white);
  g.drawEllipse(fx*(-8),-77+eyeOffY,9,eyeH);
  g.drawEllipse(fx*(8), -77+eyeOffY,9,eyeH);
  g.endFill();
  // Iris
  g.beginFill(CC.eye);
  g.drawEllipse(fx*(-8),-77+eyeOffY,7,eyeH-1);
  g.drawEllipse(fx*(8), -77+eyeOffY,7,eyeH-1);
  g.endFill();
  // Pupil
  g.beginFill(CC.pupil);
  g.drawEllipse(fx*(-8),-77+eyeOffY,3.5,pupilH);
  g.drawEllipse(fx*(8), -77+eyeOffY,3.5,pupilH);
  g.endFill();
  // Eye shine
  g.beginFill(CC.white,0.9);
  g.drawCircle(fx*(-5),-80+eyeOffY,2.5);
  g.drawCircle(fx*(11),-80+eyeOffY,2.5);
  g.endFill();

  // Nose
  g.beginFill(CC.nose);
  g.drawPolygon([0,-70, fx*(-3),-68, fx*(3),-68]);
  g.endFill();

  // Mouth
  g.lineStyle(1.5,0xaa7730,0.8);
  if(P==='hit'||P==='throw'){
    // Determined expression '>_<'
    g.moveTo(fx*(-4),-67); g.lineTo(fx*(4),-67);
  } else if(P==='celebrate'){
    // Big smile
    g.moveTo(fx*(-6),-67); g.quadraticCurveTo(0,-62, fx*(6),-67);
  } else {
    // Normal small smile
    g.moveTo(fx*(-3),-67); g.quadraticCurveTo(0,-63, fx*(3),-67);
  }
  g.lineStyle(0);

  // Blush (only on happy/idle)
  if(P!=='hit'&&P!=='throw'){
    g.beginFill(CC.cheek,0.3);
    g.drawEllipse(fx*(-14),-73,7,4);
    g.drawEllipse(fx*(14), -73,7,4);
    g.endFill();
  }

  // Head tuft
  g.beginFill(CC.creamD,0.45);
  g.moveTo(0,-97); g.lineTo(fx*(-5),-90); g.lineTo(fx*(5),-90); g.closePath(); g.endFill();

  // Angry lines when charging hard
  if(chargeR > 0.6){
    g.lineStyle(2,0xff4444,chargeR-0.5);
    g.moveTo(fx*(-14),-86); g.lineTo(fx*(-20),-92);
    g.moveTo(fx*(14),-86);  g.lineTo(fx*(20),-92);
    g.lineStyle(0);
  }
}

// Cat state management
const catGfx=new PIXI.Graphics();
catGfx.x=CAT_HOME.x; catGfx.y=CAT_HOME.y;
lCat.addChild(catGfx);

// Small shadow under cat
const catShadow=new PIXI.Graphics();
lCat.addChildAt(catShadow,0);

const catState={
  pose:'idle',    // idle|walk|hit|throw|celebrate|return
  phase:0,        // animation phase (radians, increases over time)
  x:CAT_HOME.x, y:CAT_HOME.y,
  targetX:CAT_HOME.x, targetY:CAT_HOME.y,
  chargeR:0,      // 0-1 charge ratio
  flip:false,     // facing left?
  onArrive:null,
};

function updateCatPosition(dt){
  const dx=catState.targetX - catState.x;
  const dy=catState.targetY - catState.y;
  const dist=Math.hypot(dx,dy);
  if(dist < 3){
    catState.x=catState.targetX;
    catState.y=catState.targetY;
    if(catState.onArrive){ const cb=catState.onArrive; catState.onArrive=null; cb(); }
  } else {
    const step=Math.min(CAT_SPEED*dt, dist);
    catState.x+=dx/dist*step;
    catState.y+=dy/dist*step;
  }

  catGfx.x=catState.x;
  catGfx.y=catState.y + (catState.pose==='walk'? Math.abs(Math.sin(catState.phase))*4:0);

  // Shadow
  catShadow.clear();
  catShadow.beginFill(0x000000,0.18);
  catShadow.drawEllipse(catState.x, catState.y+2, 22, 8);
  catShadow.endFill();
}

function redrawCat(){
  drawCat(catGfx, catState.pose, catState.phase, catState.chargeR, catState.flip);
}

const objects=new Map();
function makeGfx(def){
  const g=new PIXI.Graphics();
  drawObjGfx(g,def);
  g.x=def.x; g.y=def.y;
  g.eventMode='static'; g.cursor='pointer';
  g.hitArea=new PIXI.Rectangle(-def.w/2-10,-def.h-10,def.w+20,def.h+20);
  g.on('pointerover',()=>showTip(def)); g.on('pointerout',hideTip);
  g.on('pointerdown',(e)=>{e.stopPropagation();onClickObj(def.id,e);});
  g.on('pointerup',()=>{if(charging&&activeObjId===def.id) release();});
  g.on('pointerupoutside',()=>{if(charging&&activeObjId===def.id) release();});
  return g;
}
function initObjs(){
  for(const def of DEFS){
    const gfx=makeGfx(def);
    lObjs.addChild(gfx);
    objects.set(def.id,{def,gfx,x:def.x,y:def.y,homeX:def.x,homeY:def.y,resting:true});
  }
}
initObjs();

// ═══════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════
let hitCount=0, catBusy=false;
let activeObjId=null, charging=false, chargeStart=0, chargeT=0;
const counterEl=document.getElementById('counter');
const statusEl=document.getElementById('status');
const chargeUI=document.getElementById('charge-ui');
const carc=document.getElementById('carc');
const chargePct=document.getElementById('charge-pct');
const CIRC=201; // 2*pi*32

function onClickObj(id,e){
  const obj=objects.get(id);
  if(!obj?.resting||obj.beingUsed) return;
  if(charging){ releaseNoThrow(); }
  if(catBusy && activeObjId===id) return;

  // Cancel previous walk if any
  catState.onArrive=null;

  catBusy=true;
  activeObjId=id;
  catState.pose='walk';
  catState.flip=(obj.x < catState.x);

  const targetX=obj.x + (obj.def.w/2+12)*(catState.flip?1:-1);
  const targetY=obj.y - 8;
  catState.targetX=targetX;
  catState.targetY=targetY;
  statusEl.textContent=`Кот бежит к ${obj.def.label}...`;

  catState.onArrive=()=>{
    catState.pose='hit';
    obj.beingUsed=true;
    charging=false;
    chargeT=0;
    statusEl.textContent=`Зажми и держи — бей!`;
    chargeUI.style.display='block';

    // Start listening for hold
    obj.gfx.on('pointerdown', startHold);
    obj.gfx.on('pointerup',   release);
    obj.gfx.on('pointerupoutside', releaseNoThrow);
    window.addEventListener('pointerup', release);
  };
}

function startHold(e){
  if(charging) return;
  e.stopPropagation();
  charging=true;
  chargeStart=performance.now();
  playSound('hit');
}

function releaseNoThrow(){
  stopCharge(false);
}

function release(e){
  if(!charging || !activeObjId) return;
  chargeT=(performance.now()-chargeStart)/1000;
  if(chargeT < 0.08){ stopCharge(false); return; }
  stopCharge(true);
}

function stopCharge(doThrow){
  const id=activeObjId;
  const obj=objects.get(id);
  if(obj){
    obj.gfx.off('pointerdown',startHold);
    obj.gfx.off('pointerup',release);
    obj.gfx.off('pointerupoutside',releaseNoThrow);
    obj.beingUsed=false;
  }
  window.removeEventListener('pointerup',release);
  chargeUI.style.display='none';
  glowGfx.clear();
  charging=false;
  catState.chargeR=0;

  if(doThrow && obj){
    throwObject(obj, chargeT);
  } else {
    catState.pose='idle';
    returnCatHome();
  }
  activeObjId=null;
}

function throwObject(obj, ct){
  const def=obj.def;
  const ratio=Math.min(ct/def.maxC, 1.0);
  const fMax=680/def.mass;
  const dir=obj.x > catState.x ? 1 : -1;
  const vx=dir*fMax*(0.4+ratio*.6)*(0.85+Math.random()*.3);
  const vy=-fMax*(0.45+ratio*.55);

  catState.pose='throw';
  playSound('throw');
  spawnBurst(obj.x, obj.y-def.h*.5, def.col, ratio);

  obj.resting=false;
  obj.gfx.visible=false;

  // Clone for physics
  const fg=new PIXI.Graphics();
  drawObjGfx(fg,def);
  fg.x=obj.x; fg.y=obj.y;
  lFly.addChild(fg);
  flying.push({gfx:fg,obj,x:obj.x,y:obj.y,vx,vy,rot:0,vrot:vx*.0025,bounces:0});

  hitCount++;
  counterEl.textContent='💥 '+hitCount;
  statusEl.textContent='💥 ЛЕТИТ!';

  setTimeout(()=>{
    catState.pose='celebrate';
    setTimeout(returnCatHome, 600);
  },500);
}

function returnCatHome(){
  catState.pose='walk';
  catState.flip=false;
  catState.targetX=CAT_HOME.x;
  catState.targetY=CAT_HOME.y;
  catState.onArrive=()=>{
    catState.pose='idle';
    catBusy=false;
    statusEl.textContent='Кликни на предмет! 😼';
  };
}

// ═══════════════════════════════════════════
// PHYSICS
// ═══════════════════════════════════════════
const flying=[];

function updatePhysics(dt){
  for(let i=flying.length-1;i>=0;i--){
    const f=flying[i];
    f.vy+=GRAVITY*dt;
    f.x+=f.vx*dt;
    f.y+=f.vy*dt;
    f.rot+=f.vrot;
    // Floor
    if(f.y>=FLOOR){
      f.y=FLOOR; f.vy*=-BOUNCE; f.vx*=FRICTION; f.vrot*=.55; f.bounces++;
      if(f.bounces===1) playSound(f.obj.def.mass>4?'land_heavy':'land_light');
      if(Math.abs(f.vy)<22 && f.bounces>1){
        f.vy=0; f.vx*=.5;
        if(Math.abs(f.vx)<5){ land(f,i); continue; }
      }
    }
    // Walls
    if(f.x<WALL_L+f.obj.def.w/2){f.x=WALL_L+f.obj.def.w/2; f.vx*=-BOUNCE;}
    if(f.x>WALL_R-f.obj.def.w/2){f.x=WALL_R-f.obj.def.w/2; f.vx*=-BOUNCE;}
    if(f.y<f.obj.def.h+5){f.y=f.obj.def.h+5; f.vy*=-BOUNCE*.5;}
    f.gfx.x=f.x; f.gfx.y=f.y; f.gfx.rotation=f.rot;
  }
}

function land(f,i){
  f.gfx.x=f.x; f.gfx.y=f.y; f.gfx.rotation=f.rot;
  lFly.removeChild(f.gfx);
  lObjs.addChild(f.gfx);
  const obj=f.obj;
  if(obj.gfx.parent) obj.gfx.parent.removeChild(obj.gfx);
  obj.gfx=f.gfx;
  obj.x=f.x; obj.y=f.y;
  drawObjGfx(f.gfx,obj.def);
  f.gfx.x=f.x; f.gfx.y=f.y; f.gfx.rotation=f.rot;
  f.gfx.eventMode='static'; f.gfx.cursor='pointer';
  f.gfx.hitArea=new PIXI.Rectangle(-obj.def.w/2-10,-obj.def.h-10,obj.def.w+20,obj.def.h+20);
  const id=obj.def.id;
  f.gfx.removeAllListeners();
  f.gfx.on('pointerover',()=>showTip(obj.def)); f.gfx.on('pointerout',hideTip);
  f.gfx.on('pointerdown',(e)=>{e.stopPropagation();onClickObj(id,e);});
  f.gfx.on('pointerup',()=>{if(charging&&activeObjId===id)release();});
  f.gfx.on('pointerupoutside',()=>{if(charging&&activeObjId===id)releaseNoThrow();});
  obj.resting=true;
  flying.splice(i,1);
}

// ═══════════════════════════════════════════
// CHARGE VISUAL
// ═══════════════════════════════════════════
function updateChargeVis(dt){
  if(!activeObjId||!charging){
    if(!charging) glowGfx.clear();
    return;
  }
  chargeT=(performance.now()-chargeStart)/1000;
  const obj=objects.get(activeObjId);
  if(!obj) return;
  const ratio=Math.min(chargeT/obj.def.maxC,1.0);
  catState.chargeR=ratio;

  // Color lerp green→yellow→red
  let r,gr;
  if(ratio<.5){r=Math.round(ratio*2*255);gr=255;}
  else{r=255;gr=Math.round((1-(ratio-.5)*2)*255);}
  const ringCol=(r<<16)|(gr<<8);

  const rad=Math.max(obj.def.w,obj.def.h)*.6+10;
  glowGfx.clear();
  [.05,.09,.15].forEach((a,i)=>{
    glowGfx.lineStyle((3-i)*4,ringCol,a*ratio);
    glowGfx.drawCircle(obj.x,obj.y-obj.def.h*.5,rad+(3-i)*6);
  });
  glowGfx.lineStyle(4,ringCol,.95);
  glowGfx.arc(obj.x,obj.y-obj.def.h*.5,rad,-Math.PI/2,-Math.PI/2+ratio*Math.PI*2);
  glowGfx.lineStyle(0);

  // SVG ring
  const offset=CIRC*(1-ratio);
  carc.style.stroke=`rgb(${r},${gr},0)`;
  carc.setAttribute('stroke-dashoffset',offset);
  chargePct.textContent=ratio>=1?'МАКСИМУМ! 🔥':`${Math.round(ratio*100)}%`;

  if(ratio>=1){
    const sh=Math.sin(performance.now()*.04)*3;
    obj.gfx.x=obj.x+sh;
  } else obj.gfx.x=obj.x;

  playSound('hit');
}

// ═══════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════
function spawnBurst(x,y,color,ratio){
  const n=8+Math.round(ratio*10);
  const cols=[color,0xffffff,0xffdd44,0xff6644,0x44aaff];
  for(let i=0;i<n;i++){
    const p=new PIXI.Graphics();
    const sz=3+Math.random()*7;
    p.beginFill(cols[Math.floor(Math.random()*cols.length)],.9);
    Math.random()>.5 ? p.drawCircle(0,0,sz/2) : p.drawRect(-sz/2,-sz/2,sz,sz);
    p.endFill();
    p.x=x+(Math.random()-.5)*16; p.y=y;
    lFx.addChild(p);
    const ang=-Math.PI*1.3+Math.random()*Math.PI*2.6;
    const spd=100+Math.random()*250*(1+ratio);
    let pvx=Math.cos(ang)*spd, pvy=Math.sin(ang)*spd-80, life=1;
    const tick=(dt)=>{
      pvy+=500*dt/60;
      p.x+=pvx*dt/60; p.y+=pvy*dt/60;
      p.rotation+=pvx*.006;
      life-=dt/60*1.8; p.alpha=Math.max(0,life);
      if(life<=0){lFx.removeChild(p);app.ticker.remove(tick);}
    };
    app.ticker.add(tick);
  }
}

// ═══════════════════════════════════════════
// SOUND
// ═══════════════════════════════════════════
let actx=null, lastHit=0;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function playSound(t){
  try{
    const ctx=ac(),now=ctx.currentTime;
    if(t==='hit'){
      if(now-lastHit<.09)return; lastHit=now;
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sawtooth';o.frequency.setValueAtTime(95,now);
      o.frequency.exponentialRampToValueAtTime(38,now+.07);
      g.gain.setValueAtTime(.14,now);g.gain.exponentialRampToValueAtTime(.001,now+.08);
      o.start(now);o.stop(now+.09); return;
    }
    if(t==='throw'){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.setValueAtTime(250,now);
      o.frequency.exponentialRampToValueAtTime(900,now+.12);
      o.frequency.exponentialRampToValueAtTime(200,now+.32);
      g.gain.setValueAtTime(.25,now);g.gain.exponentialRampToValueAtTime(.001,now+.36);
      o.start(now);o.stop(now+.4);
      const buf=ctx.createBuffer(1,ctx.sampleRate*.07,ctx.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.5;
      const ns=ctx.createBufferSource(),ng=ctx.createGain();
      ns.buffer=buf;ns.connect(ng);ng.connect(ctx.destination);
      ng.gain.setValueAtTime(.3,now);ng.gain.exponentialRampToValueAtTime(.001,now+.1);
      ns.start(now); return;
    }
    if(t==='land_heavy'){
      const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),g=ctx.createGain();
      o.connect(f);f.connect(g);g.connect(ctx.destination);
      o.type='sawtooth';o.frequency.setValueAtTime(120,now);
      o.frequency.exponentialRampToValueAtTime(20,now+.26);
      f.type='lowpass';f.frequency.value=280;
      g.gain.setValueAtTime(.48,now);g.gain.exponentialRampToValueAtTime(.001,now+.30);
      o.start(now);o.stop(now+.35);
      const buf=ctx.createBuffer(1,ctx.sampleRate*.1,ctx.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
      const ns=ctx.createBufferSource(),ng=ctx.createGain();
      ns.buffer=buf;ns.connect(ng);ng.connect(ctx.destination);
      ng.gain.setValueAtTime(.4,now);ng.gain.exponentialRampToValueAtTime(.001,now+.13);
      ns.start(now); return;
    }
    if(t==='land_light'){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='triangle';o.frequency.setValueAtTime(650,now);
      o.frequency.exponentialRampToValueAtTime(200,now+.09);
      g.gain.setValueAtTime(.18,now);g.gain.exponentialRampToValueAtTime(.001,now+.11);
      o.start(now);o.stop(now+.13); return;
    }
    if(t==='reset'){
      [0,.08,.16].forEach((d,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=[500,650,800][i];
        g.gain.setValueAtTime(0,now+d);g.gain.linearRampToValueAtTime(.15,now+d+.04);
        g.gain.exponentialRampToValueAtTime(.001,now+d+.25);
        o.start(now+d);o.stop(now+d+.28);
      });
    }
  }catch(e){}
}

},{once:true});

// ═══════════════════════════════════════════
// RESET
// ═══════════════════════════════════════════
function resetOffice(){
  if(catBusy) return;
  playSound('reset');
  if(charging){releaseNoThrow();}
  for(const f of flying){if(f.gfx.parent)f.gfx.parent.removeChild(f.gfx);}
  flying.length=0;
  for(const[id,obj]of objects){
    if(obj.gfx.parent)obj.gfx.parent.removeChild(obj.gfx);
    const gfx=makeGfx(obj.def);
    gfx.x=obj.x; gfx.y=obj.y;
    lObjs.addChild(gfx); obj.gfx=gfx;
    const sx=obj.x,sy=obj.y,sr=gfx.rotation||0;
    const ex=obj.homeX,ey=obj.homeY;
    const dur=.4+Math.random()*.25; let tt=0;
    const anim=dt=>{
      tt+=dt/60/dur;
      const e=tt>=1?1:1-Math.pow(1-tt,3);
      gfx.x=sx+(ex-sx)*e; gfx.y=sy+(ey-sy)*e; gfx.rotation=sr*(1-e);
      if(tt>=1){gfx.x=ex;gfx.y=ey;gfx.rotation=0;obj.x=ex;obj.y=ey;obj.resting=true;app.ticker.remove(anim);}
    };
    obj.resting=false;
    app.ticker.add(anim);
  }
  statusEl.textContent='Всё убрано... пока 😈';
}
document.getElementById('btn-reset').addEventListener('click',resetOffice);
document.getElementById('btn-reset').addEventListener('touchend',e=>{e.preventDefault();resetOffice();});

let totalT=0;
app.ticker.add(delta=>{
  const dt=delta/60;
  totalT+=dt;
  catState.phase+=dt*5;

  updateCatPosition(dt);
  updatePhysics(dt);
  updateChargeVis(dt);

  // Idle cat bob
  if(catState.pose==='idle'){
    catGfx.y=catState.y+Math.sin(totalT*1.8)*2;
  }
  redrawCat();
});
