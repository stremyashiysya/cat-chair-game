<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Котик в офисе 🐱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#1a0e1a;overflow:hidden;touch-action:none}
body{display:flex;align-items:center;justify-content:center}
#wrap{position:absolute;width:800px;height:600px;transform-origin:top left}
canvas{display:block}
#ui{position:absolute;inset:0;pointer-events:none}
#counter{position:absolute;top:12px;left:14px;color:#fff2a0;font:bold 26px/1 'Arial Black',Arial;
  text-shadow:0 0 20px #ff8800,0 2px 0 #aa4400,0 3px 6px rgba(0,0,0,.8)}
#status{position:absolute;top:46px;left:14px;color:#fff;font:bold 13px Arial;text-shadow:0 1px 4px rgba(0,0,0,.9)}
#charge-ui{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);text-align:center;display:none;pointer-events:none}
#charge-pct{color:#fff;font:bold 15px 'Arial Black',Arial;text-shadow:0 0 8px #ffaa00,0 2px 4px rgba(0,0,0,.9);margin-top:4px}
#btn-reset{position:absolute;bottom:14px;right:14px;padding:10px 22px;
  background:linear-gradient(160deg,#3a6fb8,#1a4a88);color:#fff;border:3px solid #7ab0ff;
  border-radius:22px;font:bold 14px Arial;cursor:pointer;pointer-events:all;
  box-shadow:0 4px 18px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.25);
  transition:all .12s;-webkit-tap-highlight-color:transparent}
#btn-reset:hover{background:linear-gradient(160deg,#4a80cc,#2a5aa0);transform:scale(1.03)}
#btn-reset:active{transform:scale(.96)}
#tooltip{position:absolute;background:rgba(10,5,20,.85);color:#ffe880;padding:5px 12px;
  border-radius:20px;font:bold 12px Arial;pointer-events:none;display:none;z-index:10;
  white-space:nowrap;transform:translate(-50%,-120%);border:2px solid rgba(255,220,100,.4)}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c"></canvas>
<div id="ui">
  <div id="counter">&#x1F4A5; 0</div>
  <div id="status">&#x1F63C; Кликни на предмет!</div>
  <div id="charge-ui">
    <svg id="cring" width="90" height="90">
      <circle cx="45" cy="45" r="36" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="7"/>
      <circle id="carc" cx="45" cy="45" r="36" fill="none" stroke="#44ff66"
        stroke-width="7" stroke-linecap="round"
        stroke-dasharray="226" stroke-dashoffset="226"
        transform="rotate(-90 45 45)"/>
    </svg>
    <div id="charge-pct">0%</div>
  </div>
  <button id="btn-reset">&#x1F504; Привести в порядок</button>
  <div id="tooltip"></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script>
const W=800,H=600,OL=0x180a04;
const wrap=document.getElementById('wrap');
function fit(){
  const s=Math.min(innerWidth/W,innerHeight/H);
  wrap.style.transform='scale('+s+')';
  wrap.style.left=((innerWidth-W*s)/2)+'px';
  wrap.style.top=((innerHeight-H*s)/2)+'px';
}
fit();addEventListener('resize',fit);

const app=new PIXI.Application({view:document.getElementById('c'),width:W,height:H,
  backgroundColor:0x1a0e1a,antialias:true,resolution:1});

const lBg=new PIXI.Container(),lSh=new PIXI.Container(),
      lObj=new PIXI.Container(),lCat=new PIXI.Container(),
      lFly=new PIXI.Container(),lFx=new PIXI.Container();
app.stage.addChild(lBg,lSh,lObj,lCat,lFly,lFx);
lBg.eventMode='none'; lSh.eventMode='none';

function dk(c,f){return(Math.round(((c>>16)&255)*f)<<16)|(Math.round(((c>>8)&255)*f)<<8)|Math.round((c&255)*f);}
function lk(c,f){return(Math.min(255,Math.round(((c>>16)&255)*f))<<16)|(Math.min(255,Math.round(((c>>8)&255)*f))<<8)|Math.min(255,Math.round((c&255)*f));}
function S(g,w,c,a){g.lineStyle(w,c===undefined?OL:c,a===undefined?1:a);}
function N(g){g.lineStyle(0);}

// ===================================================
// DISNEY OFFICE BACKGROUND
// ===================================================
function drawOffice(g){
  g.clear();

  // Ceiling - soft lilac
  g.beginFill(0xe8e0f0);g.drawRect(0,0,W,108);g.endFill();
  g.lineStyle(1.5,0xccc0d8,.38);
  for(let x=0;x<W;x+=100){g.moveTo(x,0);g.lineTo(x,108);}
  g.moveTo(0,54);g.lineTo(W,54);g.lineStyle(0);
  // Ceiling lights
  [130,400,670].forEach(function(lx){
    g.beginFill(0xfffae0,.75);g.drawRoundedRect(lx-56,6,112,20,6);g.endFill();
    S(g,2,0xddd0a0,.8);g.drawRoundedRect(lx-56,6,112,20,6);N(g);
    g.beginFill(0xffffff,.45);g.drawRoundedRect(lx-52,8,104,10,4);g.endFill();
    // glow halo
    g.beginFill(0xfffff0,.06);g.drawEllipse(lx,40,90,22);g.endFill();
  });

  // Back wall - warm cream
  g.beginFill(0xf8f0dc);g.drawRect(0,108,W,250);g.endFill();
  // Subtle wall texture
  g.lineStyle(1,0xe8e0cc,.25);
  for(let y=130;y<360;y+=40){g.moveTo(0,y);g.lineTo(W,y);}
  g.lineStyle(0);
  // Wainscoting strip
  g.beginFill(0x4a90a8);g.drawRect(0,305,W,52);g.endFill();
  g.beginFill(0x5ab0c8);g.drawRect(0,305,W,7);g.endFill();
  g.beginFill(0x3a7a92);g.drawRect(0,350,W,7);g.endFill();

  // Floor - warm honey wood
  g.beginFill(0xc89048);g.drawRect(0,357,W,H-357);g.endFill();
  g.lineStyle(2,0xb07838,.45);
  for(let y=368;y<H;y+=22){g.moveTo(0,y);g.lineTo(W,y);}
  g.lineStyle(3,0xa06828,.3);
  for(let x=80;x<W;x+=80){g.moveTo(x,357);g.lineTo(x,H);}
  g.lineStyle(0);
  g.beginFill(0xffd890,.07);g.drawRect(0,H-100,W,100);g.endFill();
  // Floor-wall line
  g.lineStyle(4,0x886028,.65);g.moveTo(0,357);g.lineTo(W,357);g.lineStyle(0);

  // Left shelf unit
  [155,215].forEach(function(sy){
    S(g,3);g.beginFill(0xa07228);g.drawRoundedRect(14,sy,162,11,3);g.endFill();N(g);
    g.beginFill(0xba8838);g.drawRoundedRect(14,sy,162,4,2);g.endFill();
  });
  // Books
  var bx=18;
  [0xcc3333,0x3355cc,0x33aa55,0xcc8833,0x885599,0x33aacc,0xcc6622].forEach(function(bc,i){
    var bw=16+Math.sin(i*1.8)*5;
    S(g,2);g.beginFill(bc);g.drawRoundedRect(bx,128,bw,26,2);g.endFill();N(g);
    g.beginFill(0xffffff,.28);g.drawRect(bx+3,128,bw-6,4);g.endFill();
    bx+=bw+3;
  });
  // Plant on lower shelf
  S(g,2);g.beginFill(0x8a4422);g.drawRoundedRect(16,190,30,22,5);g.endFill();N(g);
  g.beginFill(0x3a7830);
  g.moveTo(31,190);g.bezierCurveTo(16,170,8,158,18,146);
  g.bezierCurveTo(26,160,29,175,31,190);g.endFill();
  g.beginFill(0x3a7830);
  g.moveTo(31,190);g.bezierCurveTo(46,170,54,158,44,146);
  g.bezierCurveTo(36,160,33,175,31,190);g.endFill();
  g.beginFill(0x4a9240);g.drawCircle(31,154,11);g.endFill();

  // Window - bright sky, top right
  var wx=588,wy=116,ww=158,wh=152;
  S(g,5);g.beginFill(0xd8c8a0);g.drawRoundedRect(wx-9,wy-9,ww+18,wh+18,9);g.endFill();N(g);
  g.beginFill(0x72d4f8);g.drawRoundedRect(wx,wy,ww,wh,5);g.endFill();
  g.beginFill(0xaaecff,.5);g.drawRoundedRect(wx,wy,ww,wh*.42,5);g.endFill();
  // Clouds
  [[wx+20,wy+24,26],[wx+56,wy+14,20],[wx+92,wy+32,17],[wx+75,wy+52,13]].forEach(function(cl){
    g.beginFill(0xffffff,.95);g.drawCircle(cl[0],cl[1],cl[2]);g.endFill();
  });
  // Window cross
  S(g,5,0xd8c8a0);g.moveTo(wx+ww/2,wy);g.lineTo(wx+ww/2,wy+wh);
  g.moveTo(wx,wy+wh*.44);g.lineTo(wx+ww,wy+wh*.44);N(g);
  // Curtains
  g.beginFill(0xf8eecc,.88);g.drawRect(wx,wy,20,wh);g.drawRect(wx+ww-20,wy,20,wh);g.endFill();
  S(g,5);g.drawRoundedRect(wx-9,wy-9,ww+18,wh+18,9);N(g);

  // Filing cabinet right wall
  var cx=700,cy=196,cw=70,ch=155;
  g.beginFill(0x000000,.14);g.drawEllipse(cx+cw/2+4,cy+ch+6,30,7);g.endFill();
  S(g,3);g.beginFill(0x6a8888);g.drawRoundedRect(cx,cy,cw,ch,6);g.endFill();N(g);
  g.beginFill(0x7aa0a0);g.drawRoundedRect(cx,cy,cw,7,4);g.endFill();
  g.beginFill(0x588080);g.drawRoundedRect(cx,cy,5,ch,3);g.endFill();
  [.16,.38,.58,.78].forEach(function(t){
    var dy=cy+ch*t;
    S(g,2,OL,.7);g.drawRoundedRect(cx+4,dy,cw-8,ch*.165,4);N(g);
    S(g,2);g.beginFill(0xe8dfc0);g.drawRoundedRect(cx+cw/2-10,dy+ch*.058,20,6,3);g.endFill();N(g);
  });

  // Poster on wall
  S(g,3);g.beginFill(0xf8f0d8);g.drawRoundedRect(248,122,132,92,6);g.endFill();N(g);
  g.beginFill(0xcc2244);g.drawRoundedRect(250,122,132,24,6);g.endFill();
  g.beginFill(0xfff0c8,.88);g.drawRoundedRect(250,146,132,66,0);g.endFill();
  S(g,3);g.drawRoundedRect(248,122,132,92,6);N(g);
  // Poster text lines (decorative)
  g.lineStyle(2.5,0xcc8844,.6);
  [156,166,176].forEach(function(py){g.moveTo(262,py);g.lineTo(368,py);});
  g.lineStyle(0);

  // Main desk - warm dark wood
  var dL=65,dR=572,dTop=284,dMid=398,dFr=435;
  // Shadow under desk
  g.beginFill(0x000000,.16);g.drawEllipse((dL+dR)/2+10,dFr+20,(dR-dL)/2+10,18);g.endFill();
  // Front face
  S(g,3.5);g.beginFill(0x5a2810);
  g.moveTo(dL,dMid);g.lineTo(dR,dMid);g.lineTo(dR,dFr);g.lineTo(dL,dFr);
  g.closePath();g.endFill();N(g);
  // Front wood grain
  g.lineStyle(1.5,0x6a3018,.38);
  for(var fy=dMid+14;fy<dFr;fy+=14){g.moveTo(dL+3,fy);g.lineTo(dR-3,fy);}
  g.lineStyle(0);
  // Front top bevel
  S(g,3);g.beginFill(0x6a3018);g.drawRoundedRect(dL,dMid,dR-dL,9,0);g.endFill();N(g);
  // Desk top surface
  S(g,3.5);g.beginFill(0x7c4020);
  g.moveTo(dL,dTop);g.lineTo(dR,dTop);g.lineTo(dR,dMid);g.lineTo(dL,dMid);
  g.closePath();g.endFill();N(g);
  // Top grain
  g.lineStyle(1.5,0x8c5030,.3);
  for(var ty=dTop+18;ty<dMid;ty+=16){g.moveTo(dL+2,ty);g.lineTo(dR-2,ty);}
  g.lineStyle(0);
  // Desk top edge highlight
  S(g,4);g.beginFill(0x9a5032);g.moveTo(dL,dTop);g.lineTo(dR,dTop);
  g.lineTo(dR,dTop+9);g.lineTo(dL,dTop+9);g.closePath();g.endFill();N(g);
  // Legs
  [[dL+12,dFr],[dR-24,dFr]].forEach(function(p){
    S(g,3);g.beginFill(0x501808);g.drawRoundedRect(p[0],p[1],17,H-p[1],4);g.endFill();N(g);
  });
}

var bgG=new PIXI.Graphics();
bgG.eventMode='none';
drawOffice(bgG);
lBg.addChild(bgG);

// ===================================================
// CAT - Disney chibi (big head, huge eyes, outlines)
// ===================================================
var CC={
  CR:0xfde8a8,CRD:0xe8c870,CRL:0xfffae0,
  JA:0x5030b0,JAD:0x382090,JAH:0x7858d0,
  BO:0xee1144,BOD:0xbb0033,
  TA:0xf8c828,TAD:0xd4a010,
  EY:0xf0a000,PU:0x180c04,
  NO:0xff8888,CH:0xff6666
};

function drawCat(g,pose,ph,chR,fl){
  g.clear();
  var f=fl?-1:1;

  // Tail
  var tpts=[];
  for(var i=0;i<=14;i++){
    var p=i/14;
    var tx=f*(24+p*44+Math.sin(p*Math.PI*1.2)*26);
    var ty=-18-p*46+Math.cos(p*Math.PI*1.8+ph*.5)*(9+p*11);
    tpts.push(tx+f*5*Math.sin(ph*.6)*p,ty);
  }
  for(var i=14;i>=0;i--){
    var p=i/14;
    var tx=f*(24+p*44+Math.sin(p*Math.PI*1.2)*26);
    var ty=-13-p*46+Math.cos(p*Math.PI*1.8+ph*.5)*(9+p*11);
    tpts.push(tx+f*5*Math.sin(ph*.6)*p,ty);
  }
  S(g,3);g.beginFill(CC.TA);g.drawPolygon(tpts);g.endFill();N(g);
  S(g,2);g.beginFill(CC.CRL);g.drawCircle(f*62,-64,8);g.endFill();N(g);

  // Legs
  var lL=pose==='walk'?Math.sin(ph)*12:0;
  var lR=pose==='walk'?Math.sin(ph+Math.PI)*12:0;
  S(g,3);g.beginFill(CC.JA);g.drawRoundedRect(f*(-19)-3,-26+lL,13,28,6);g.endFill();N(g);
  S(g,3);g.beginFill(CC.JAD);g.drawRoundedRect(f*4,-26+lR,13,28,6);g.endFill();N(g);
  S(g,2.5);g.beginFill(CC.CR);g.drawEllipse(f*(-13),lL+5,10,6);g.endFill();N(g);
  S(g,2.5);g.beginFill(CC.CR);g.drawEllipse(f*10,lR+5,10,6);g.endFill();N(g);

  // Body
  S(g,3.5);g.beginFill(CC.JA);g.drawRoundedRect(-21,-68,42,44,11);g.endFill();N(g);
  g.beginFill(CC.JAH,.22);g.drawRoundedRect(-21,-68,42,12,11);g.endFill();
  // Lapels
  g.beginFill(CC.CRL,.6);
  g.moveTo(f*(-3),-68);g.lineTo(f*(-15),-50);g.lineTo(f*(-3),-44);g.closePath();g.endFill();

  // Bow tie
  S(g,2.5);g.beginFill(CC.BO);
  g.moveTo(f*(-9),-56);g.lineTo(0,-51);g.lineTo(f*(-9),-46);g.lineTo(f*(-15),-51);g.closePath();
  g.moveTo(f*9,-56);g.lineTo(0,-51);g.lineTo(f*9,-46);g.lineTo(f*15,-51);g.closePath();
  g.endFill();N(g);
  S(g,2);g.beginFill(CC.BOD);g.drawCircle(0,-51,5);g.endFill();N(g);

  // Left arm
  S(g,3);g.beginFill(CC.JA);g.drawRoundedRect(f*(-29),-70,12,30,5);g.endFill();N(g);
  S(g,2.5);g.beginFill(CC.CR);g.drawEllipse(f*(-23),-39,8,6);g.endFill();N(g);

  // Right arm (animated)
  var armR=0,armUp=0;
  if(pose==='hit'){armR=Math.sin(ph*2.2)*(0.65+chR*.5);armUp=Math.abs(Math.sin(ph*2.2))*18*(1+chR*.7);}
  else if(pose==='throw'){armR=f*(-Math.PI*.52);armUp=24;}
  else if(pose==='celebrate'){armUp=Math.sin(ph*3)*15+18;}
  var ax=f*18,ay=-68;
  var ca=Math.cos(fl?Math.PI-armR:armR),sa=Math.sin(fl?Math.PI-armR:armR);
  var al=30,aw=11;
  S(g,3);g.beginFill(CC.JAD);
  g.drawPolygon([ax-aw/2*ca,ay-armUp-aw/2*sa,ax+aw/2*ca,ay-armUp+aw/2*sa,
    ax+aw/2*ca+al*sa,ay-armUp+al*(-ca)+aw/2*sa,ax-aw/2*ca+al*sa,ay-armUp+al*(-ca)-aw/2*sa]);
  g.endFill();N(g);
  var px=ax+al*sa,py=ay-armUp+al*(-ca);
  S(g,2.5);g.beginFill(CC.CR);g.drawCircle(px,py,7.5);g.endFill();N(g);

  // Head shadow
  g.beginFill(CC.CRD,.28);g.drawCircle(2,-95,39);g.endFill();
  // Head
  S(g,3.5);g.beginFill(CC.CR);g.drawCircle(0,-96,38);g.endFill();N(g);

  // Ears
  S(g,3);g.beginFill(CC.CR);
  g.drawPolygon([f*(-38),-107,f*(-23),-132,f*(-6),-107]);g.endFill();N(g);
  S(g,3);g.beginFill(CC.CR);
  g.drawPolygon([f*38,-107,f*23,-132,f*6,-107]);g.endFill();N(g);
  g.beginFill(CC.NO,.72);
  g.drawPolygon([f*(-35),-110,f*(-23),-126,f*(-11),-110]);g.endFill();
  g.beginFill(CC.NO,.72);
  g.drawPolygon([f*35,-110,f*23,-126,f*11,-110]);g.endFill();

  // Eyebrows
  var angry=(pose==='hit'||pose==='throw');
  g.lineStyle(3.5,CC.CRD,1);
  if(angry){
    g.moveTo(f*(-21),-110);g.lineTo(f*(-7),-104);
    g.moveTo(f*21,-110);g.lineTo(f*7,-104);
  }else{
    g.moveTo(f*(-20),-111);g.quadraticCurveTo(f*(-13),-115,f*(-6),-111);
    g.moveTo(f*20,-111);g.quadraticCurveTo(f*13,-115,f*6,-111);
  }
  g.lineStyle(0);

  // Eyes - HUGE Disney
  var ew=15,eh=angry?9:14;
  S(g,2.5);g.beginFill(0xffffff);
  g.drawEllipse(f*(-13),-95,ew,eh);g.drawEllipse(f*13,-95,ew,eh);g.endFill();N(g);
  g.beginFill(CC.EY);
  g.drawEllipse(f*(-13),-95,ew-2,eh-1);g.drawEllipse(f*13,-95,ew-2,eh-1);g.endFill();
  // Pupil
  g.beginFill(CC.PU);
  g.drawEllipse(f*(-13),-95,angry?3.5:4.5,eh-1);
  g.drawEllipse(f*13,-95,angry?3.5:4.5,eh-1);g.endFill();
  // Sparkle highlights (2 per eye)
  g.beginFill(0xffffff,.95);
  g.drawCircle(f*(-9),-99,3.5);g.drawCircle(f*(-7),-91,2);
  g.drawCircle(f*17,-99,3.5);g.drawCircle(f*15,-91,2);g.endFill();
  S(g,2.5);
  g.drawEllipse(f*(-13),-95,ew,eh);g.drawEllipse(f*13,-95,ew,eh);N(g);

  // Nose
  S(g,1.5);g.beginFill(CC.NO);
  g.drawPolygon([0,-83,f*(-4.5),-80,f*4.5,-80]);g.endFill();N(g);

  // Mouth
  g.lineStyle(2.5,CC.CRD,1);
  if(angry){g.moveTo(f*(-5),-78);g.lineTo(f*5,-78);}
  else if(pose==='celebrate'){g.moveTo(f*(-8),-78);g.quadraticCurveTo(0,-72,f*8,-78);}
  else{g.moveTo(f*(-4),-78);g.quadraticCurveTo(0,-74,f*4,-78);}
  g.moveTo(0,-81);g.lineTo(0,-78);g.lineStyle(0);

  // Blush
  if(!angry){
    g.beginFill(CC.CH,.25);
    g.drawEllipse(f*(-23),-90,11,6);g.drawEllipse(f*23,-90,11,6);g.endFill();
  }
  // Anger sparks
  if(chR>.5){
    var a=chR-.4;
    g.lineStyle(2.5,0xff4422,a);
    g.moveTo(f*(-30),-115);g.lineTo(f*(-40),-127);
    g.moveTo(f*30,-115);g.lineTo(f*40,-127);
    g.moveTo(f*(-34),-98);g.lineTo(f*(-46),-103);
    g.lineStyle(0);
  }
}

var catCon=new PIXI.Container();
var catG=new PIXI.Graphics();
catCon.addChild(catG);
lCat.addChild(catCon);
var catShG=new PIXI.Graphics();
lSh.addChild(catShG);

var CAT_HOME={x:290,y:395};
var CAT_SPD=235;
var cat={pose:'idle',ph:0,x:CAT_HOME.x,y:CAT_HOME.y,tx:CAT_HOME.x,ty:CAT_HOME.y,
  chR:0,flip:false,onArrive:null,busy:false};

function updateCat(dt){
  var dx=cat.tx-cat.x,dy=cat.ty-cat.y,d=Math.sqrt(dx*dx+dy*dy);
  if(d>3){var s=Math.min(CAT_SPD*dt,d);cat.x+=dx/d*s;cat.y+=dy/d*s;}
  else if(cat.onArrive){cat.x=cat.tx;cat.y=cat.ty;var cb=cat.onArrive;cat.onArrive=null;cb();}
  catCon.x=cat.x;
  catCon.y=cat.y+(cat.pose==='walk'?Math.abs(Math.sin(cat.ph))*5:0);
  catShG.clear();
  catShG.beginFill(0,0.14);catShG.drawEllipse(cat.x,cat.y+5,26,9);catShG.endFill();
}

// ===================================================
// OBJECTS - Disney style with outlines
// ===================================================

      c=0xff5522;
      S(g,3);g.beginFill(c);g.drawRoundedRect(-w/2,-h,w,h*.86,6);g.endFill();N(g);

      S(g,3.5);g.beginFill(dk(c,.75));g.arc(w/2+5,-h/2+4,9,-Math.PI*.72,Math.PI*.72);g.endFill();N(g);
      g.beginFill(0x2a1208,.92);g.drawEllipse(0,-h+3,w/2-3,5);g.endFill();

      S(g,3);g.beginFill(dk(c,.8));g.drawRoundedRect(-4,-h*.75,8,h*.75,3);g.endFill();N(g);

// Shadows layer gfx
var shadowG=new PIXI.Graphics();lSh.addChild(shadowG);
function redrawShadows(){
  shadowG.clear();
  for(var e=objects.entries(),r=e.next();!r.done;r=e.next()){
    var obj=r.value[1];
    if(obj.resting){
      shadowG.beginFill(0,0.11);
      shadowG.drawEllipse(obj.x,obj.y+3,Math.max(obj.def.w,28)*.75,8);
      shadowG.endFill();
    }
  }
}

var objects=new Map();
function makeGfx(def){
  var g=new PIXI.Graphics();
  dObj(g,def);
  g.eventMode='static';g.cursor='pointer';
  var hw=Math.max(def.w,58),hh=Math.max(def.h,50);
  g.hitArea=new PIXI.Rectangle(-hw/2,-(def.h+12),hw,def.h+24);
  g.on('pointerover',function(){showTip(def);});
  g.on('pointerout',hideTip);
  g.on('pointerdown',function(e){e.stopPropagation();onObjClick(def.id,e);});
  g.on('pointerup',function(){if(charging&&actId===def.id)release();});
  g.on('pointerupoutside',function(){if(charging&&actId===def.id)relNoThrow();});
  return g;
}
function initObjs(){
  DEFS.forEach(function(def){
    var gfx=makeGfx(def);gfx.x=def.x;gfx.y=def.y;lObj.addChild(gfx);
    objects.set(def.id,{def:def,gfx:gfx,x:def.x,y:def.y,homeX:def.x,homeY:def.y,resting:true,beingUsed:false});
  });
  redrawShadows();
}
initObjs();

// Tooltip
var tipEl=document.getElementById('tooltip');
function showTip(def){tipEl.textContent=def.lbl;tipEl.style.display='block';}
function hideTip(){tipEl.style.display='none';}
document.addEventListener('pointermove',function(e){
  var r=wrap.getBoundingClientRect();
  var s=parseFloat((wrap.style.transform.match(/[\d.]+/)||[1])[0]);
  tipEl.style.left=((e.clientX-r.left)/s)+'px';
  tipEl.style.top=((e.clientY-r.top)/s)+'px';
});

// Glow
var glowG=new PIXI.Graphics();lFx.addChild(glowG);

// ===================================================
// GAME STATE
// ===================================================
var hitCount=0,actId=null,charging=false,chargeStart=0,chargeT=0;
var counterEl=document.getElementById('counter');
var statusEl=document.getElementById('status');
var chargeUI=document.getElementById('charge-ui');
var carc=document.getElementById('carc');
var chPct=document.getElementById('charge-pct');
var CIRC=226;

function onObjClick(id,e){
  var obj=objects.get(id);
  if(!obj||!obj.resting||obj.beingUsed)return;
  if(charging)relNoThrow();
  cat.busy=true;actId=id;
  cat.pose='walk';cat.flip=(obj.x<cat.x);cat.onArrive=null;
  var side=cat.flip?1:-1;
  cat.tx=obj.x+(obj.def.w/2+16)*side;cat.ty=obj.y-6;
  cat.onArrive=function(){
    cat.pose='hit';obj.beingUsed=true;charging=false;chargeT=0;
    statusEl.textContent='Зажми и держи! 💪';chargeUI.style.display='block';
    obj.gfx.on('pointerdown',startHold);
    obj.gfx.on('pointerup',release);
    obj.gfx.on('pointerupoutside',relNoThrow);
    window.addEventListener('pointerup',release);
  };
  statusEl.textContent='Бежит... 🏃';
}
function startHold(e){if(charging)return;e.stopPropagation();charging=true;chargeStart=performance.now();playSound('hit');}
function relNoThrow(){stopCharge(false);}
function release(){if(!charging||!actId)return;stopCharge(true);}
function stopCharge(doThrow){
  var id=actId;var obj=objects.get(id);
  if(obj){obj.gfx.off('pointerdown',startHold);obj.gfx.off('pointerup',release);obj.gfx.off('pointerupoutside',relNoThrow);obj.beingUsed=false;}
  window.removeEventListener('pointerup',release);
  chargeUI.style.display='none';glowG.clear();charging=false;cat.chR=0;
  chargeT=Math.max(0,(performance.now()-chargeStart)/1000);
  if(doThrow&&obj&&chargeT>.07)throwObj(obj,chargeT);
  else{cat.pose='idle';goHome();}
  actId=null;
}
function throwObj(obj,ct){
  var def=obj.def,ratio=Math.min(ct/def.maxC,1);
  var fMax=740/def.mass,dir=obj.x>cat.x?1:-1;
  var vx=dir*fMax*(.38+ratio*.62)*(.8+Math.random()*.4);
  var vy=-fMax*(.42+ratio*.58);
  cat.pose='throw';playSound('throw');spawnBurst(obj.x,obj.y-def.h*.5,ratio);
  obj.resting=false;obj.gfx.visible=false;
  var fg=new PIXI.Graphics();dObj(fg,def);fg.x=obj.x;fg.y=obj.y;lFly.addChild(fg);
  flying.push({gfx:fg,obj:obj,x:obj.x,y:obj.y,vx:vx,vy:vy,rot:0,vrot:vx*.003,bounces:0});
  hitCount++;counterEl.textContent='💥 '+hitCount;
  statusEl.textContent='ЛЕТИТ! 💥';redrawShadows();
  setTimeout(function(){cat.pose='celebrate';setTimeout(goHome,600);},450);
}
function goHome(){
  cat.pose='walk';cat.flip=false;cat.tx=CAT_HOME.x;cat.ty=CAT_HOME.y;
  cat.onArrive=function(){cat.pose='idle';cat.busy=false;statusEl.textContent='😼 Кликни на предмет!';};
}

// Physics
var flying=[];
var GRAV=925,BNC=.52,FRIC=.76,FLY=H-24,WL=16,WR=W-16;
function updatePhys(dt){
  for(var i=flying.length-1;i>=0;i--){
    var f=flying[i];
    f.vy+=GRAV*dt;f.x+=f.vx*dt;f.y+=f.vy*dt;f.rot+=f.vrot*dt*60;
    if(f.y>=FLY){
      f.y=FLY;f.vy*=-BNC;f.vx*=FRIC;f.vrot*=.5;f.bounces++;
      if(f.bounces===1)playSound(f.obj.def.mass>4?'land_heavy':'land_light');
      if(Math.abs(f.vy)<22&&f.bounces>1){f.vy=0;f.vx*=.44;
        if(Math.abs(f.vx)<4){land(f,i);continue;}}
    }
    if(f.x<WL+f.obj.def.w/2){f.x=WL+f.obj.def.w/2;f.vx*=-BNC*1.1;}
    if(f.x>WR-f.obj.def.w/2){f.x=WR-f.obj.def.w/2;f.vx*=-BNC*1.1;}
    if(f.y<f.obj.def.h+5){f.y=f.obj.def.h+5;f.vy*=-BNC*.4;}
    f.gfx.x=f.x;f.gfx.y=f.y;f.gfx.rotation=f.rot;
  }
}
function land(f,i){
  f.gfx.x=f.x;f.gfx.y=f.y;f.gfx.rotation=f.rot;
  lFly.removeChild(f.gfx);lObj.addChild(f.gfx);
  var obj=f.obj;
  if(obj.gfx.parent)obj.gfx.parent.removeChild(obj.gfx);
  obj.gfx=f.gfx;obj.x=f.x;obj.y=f.y;
  dObj(f.gfx,obj.def);f.gfx.x=f.x;f.gfx.y=f.y;f.gfx.rotation=f.rot;
  f.gfx.eventMode='static';f.gfx.cursor='pointer';
  var hw=Math.max(obj.def.w,58),id=obj.def.id;
  f.gfx.hitArea=new PIXI.Rectangle(-hw/2,-(obj.def.h+12),hw,obj.def.h+24);
  f.gfx.removeAllListeners();
  f.gfx.on('pointerover',function(){showTip(obj.def);});f.gfx.on('pointerout',hideTip);
  f.gfx.on('pointerdown',function(e){e.stopPropagation();onObjClick(id,e);});
  f.gfx.on('pointerup',function(){if(charging&&actId===id)release();});
  f.gfx.on('pointerupoutside',function(){if(charging&&actId===id)relNoThrow();});
  obj.resting=true;flying.splice(i,1);redrawShadows();
}

// Charge visuals
function updateCharge(dt){
  if(!actId||!charging){glowG.clear();return;}
  chargeT=(performance.now()-chargeStart)/1000;
  var obj=objects.get(actId);if(!obj)return;
  var ratio=Math.min(chargeT/obj.def.maxC,1);cat.chR=ratio;
  var r,gr;
  if(ratio<.5){r=Math.round(ratio*2*255);gr=255;}else{r=255;gr=Math.round((1-(ratio-.5)*2)*255);}
  var col=(r<<16)|(gr<<8);
  var rad=Math.max(obj.def.w,obj.def.h)*.65+14;
  glowG.clear();
  [.04,.07,.12].forEach(function(a,i){
    glowG.lineStyle((3-i)*5.5,col,a*ratio);
    glowG.drawCircle(obj.x,obj.y-obj.def.h*.5,rad+(3-i)*8);
  });
  glowG.lineStyle(6,col,.95);
  glowG.arc(obj.x,obj.y-obj.def.h*.5,rad,-Math.PI/2,-Math.PI/2+ratio*Math.PI*2);
  glowG.lineStyle(0);
  if(ratio>=1)obj.gfx.x=obj.x+Math.sin(performance.now()*.045)*3.5;
  else obj.gfx.x=obj.x;
  carc.style.stroke='rgb('+r+','+gr+',0)';
  carc.setAttribute('stroke-dashoffset',CIRC*(1-ratio));
  chPct.textContent=ratio>=1?'🔥 МАКСИМУМ!':Math.round(ratio*100)+'%';
}

// Particles
function spawnBurst(x,y,ratio){
  var n=10+Math.round(ratio*14);
  var cols=[0xff6633,0xffffff,0xffee44,0x44ccff,0xff5599,0xaaffaa];
  for(var i=0;i<n;i++){
    var p=new PIXI.Graphics();
    var sz=4+Math.random()*9;
    var pc=cols[Math.floor(Math.random()*cols.length)];
    p.beginFill(pc,.9);
    if(Math.random()>.45)p.drawCircle(0,0,sz/2);
    else{var ps=sz/2;p.drawPolygon([0,-ps,ps*.7,ps*.4,-ps*.7,ps*.4]);}
    p.endFill();
    p.x=x+(Math.random()-.5)*20;p.y=y;lFx.addChild(p);
    var ang=-Math.PI*1.5+Math.random()*Math.PI*3;
    var spd=130+Math.random()*300*(1+ratio);
    var pvx=Math.cos(ang)*spd,pvy=Math.sin(ang)*spd-100,life=1;
    (function(p,pvx,pvy,life){
      var tick=function(dt){
        pvy+=480*dt/60;p.x+=pvx*dt/60;p.y+=pvy*dt/60;
        p.rotation+=pvx*.007;life-=dt/60*1.7;p.alpha=Math.max(0,life);
        if(life<=0){lFx.removeChild(p);app.ticker.remove(tick);}
      };
      app.ticker.add(tick);
    })(p,pvx,pvy,life);
  }
}

// Sound
var actx=null,lastHit=0;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function playSound(t){try{
  var ctx=ac(),now=ctx.currentTime;
  if(t==='hit'){if(now-lastHit<.08)return;lastHit=now;
    var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
    o.type='sawtooth';o.frequency.setValueAtTime(88,now);o.frequency.exponentialRampToValueAtTime(34,now+.08);
    g.gain.setValueAtTime(.16,now);g.gain.exponentialRampToValueAtTime(.001,now+.1);o.start(now);o.stop(now+.11);return;}
  if(t==='throw'){
    var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(900,now+.15);
    o.frequency.exponentialRampToValueAtTime(160,now+.38);
    g.gain.setValueAtTime(.28,now);g.gain.exponentialRampToValueAtTime(.001,now+.42);o.start(now);o.stop(now+.46);
    var buf=ctx.createBuffer(1,ctx.sampleRate*.06,ctx.sampleRate);
    var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.5;
    var ns=ctx.createBufferSource(),ng=ctx.createGain();ns.buffer=buf;ns.connect(ng);ng.connect(ctx.destination);
    ng.gain.setValueAtTime(.22,now);ng.gain.exponentialRampToValueAtTime(.001,now+.1);ns.start(now);return;}
  if(t==='land_heavy'){
    var o=ctx.createOscillator(),f=ctx.createBiquadFilter(),g=ctx.createGain();
    o.connect(f);f.connect(g);g.connect(ctx.destination);o.type='sawtooth';
    o.frequency.setValueAtTime(105,now);o.frequency.exponentialRampToValueAtTime(16,now+.3);
    f.type='lowpass';f.frequency.value=250;
    g.gain.setValueAtTime(.52,now);g.gain.exponentialRampToValueAtTime(.001,now+.34);o.start(now);o.stop(now+.38);
    var buf=ctx.createBuffer(1,ctx.sampleRate*.1,ctx.sampleRate);
    var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    var ns=ctx.createBufferSource(),ng=ctx.createGain();ns.buffer=buf;ns.connect(ng);ng.connect(ctx.destination);
    ng.gain.setValueAtTime(.36,now);ng.gain.exponentialRampToValueAtTime(.001,now+.15);ns.start(now);return;}
  if(t==='land_light'){
    var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
    o.type='triangle';o.frequency.setValueAtTime(680,now);o.frequency.exponentialRampToValueAtTime(200,now+.1);
    g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.001,now+.13);o.start(now);o.stop(now+.16);return;}
  if(t==='reset'){
    [0,.1,.2].forEach(function(d,i){
      var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=[480,640,800][i];
      g.gain.setValueAtTime(0,now+d);g.gain.linearRampToValueAtTime(.15,now+d+.04);
      g.gain.exponentialRampToValueAtTime(.001,now+d+.3);o.start(now+d);o.stop(now+d+.34);
    });}
}catch(e){}}
document.addEventListener('pointerdown',function(){if(actx&&actx.state==='suspended')actx.resume();},{once:true});

// Reset
function resetAll(){
  if(cat.busy)return;if(charging)relNoThrow();playSound('reset');
  for(var i=0;i<flying.length;i++)if(flying[i].gfx.parent)flying[i].gfx.parent.removeChild(flying[i].gfx);
  flying.length=0;
  objects.forEach(function(obj){
    if(obj.gfx.parent)obj.gfx.parent.removeChild(obj.gfx);
    var gfx=makeGfx(obj.def);gfx.x=obj.x;gfx.y=obj.y;lObj.addChild(gfx);obj.gfx=gfx;
    var sx=obj.x,sy=obj.y,sr=gfx.rotation||0,ex=obj.homeX,ey=obj.homeY;
    var dur=.38+Math.random()*.24,tt=0;obj.resting=false;
    var anim=function(dt){
      tt+=dt/60/dur;var e=tt>=1?1:1-Math.pow(1-tt,3);
      gfx.x=sx+(ex-sx)*e;gfx.y=sy+(ey-sy)*e;gfx.rotation=sr*(1-e);
      if(tt>=1){gfx.x=ex;gfx.y=ey;gfx.rotation=0;obj.x=ex;obj.y=ey;obj.resting=true;app.ticker.remove(anim);redrawShadows();}
    };
    app.ticker.add(anim);
  });
  statusEl.textContent='Убрано... ненадолго 😈';
}
document.getElementById('btn-reset').addEventListener('click',resetAll);
document.getElementById('btn-reset').addEventListener('touchend',function(e){e.preventDefault();resetAll();});
document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();if(charging)release();}});

// Main loop
var totalT=0;
app.ticker.add(function(delta){
  var dt=delta/60;totalT+=dt;cat.ph+=dt*5;
  updateCat(dt);updatePhys(dt);updateCharge(dt);
  if(cat.pose==='idle')catCon.y=cat.y+Math.sin(totalT*2)*2;
  drawCat(catG,cat.pose,cat.ph,cat.chR,cat.flip);
});
console.log('Disney cat ready!');
