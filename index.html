<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Котик и стулья</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a0a2e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* Фоновые звёзды */
.stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  from { opacity: 0.2; transform: scale(1); }
  to   { opacity: 0.9; transform: scale(1.3); }
}

/* Основной контейнер */
#game {
  position: relative;
  z-index: 1;
  width: min(480px, 100vw);
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* Счёт */
#score-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 8px 20px;
  backdrop-filter: blur(10px);
}
#score-bar span {
  color: #fff;
  font-size: 14px;
  font-weight: bold;
}
#score-count {
  color: #ffd700;
  font-size: 22px;
  font-weight: 900;
  text-shadow: 0 0 10px #ffd700;
}

/* Сцена */
#scene {
  position: relative;
  width: 100%;
  height: min(320px, 60vw);
  background: linear-gradient(180deg, #0d0520 0%, #1a0a3e 60%, #2d1060 100%);
  border-radius: 24px;
  border: 3px solid rgba(150,80,255,0.4);
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

/* Пол */
#floor {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 50px;
  background: linear-gradient(180deg, #3d1a6e 0%, #2a0f50 100%);
  border-top: 3px solid rgba(150,80,255,0.5);
}

/* Кот */
#cat-wrap {
  position: absolute;
  bottom: 38px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  transition: filter 0.3s;
}
#cat-video {
  width: min(180px, 38vw);
  height: auto;
  display: block;
  filter: drop-shadow(0 0 20px rgba(150,80,255,0.7));
}

/* Зона стула */
#chair-zone {
  position: absolute;
  bottom: 38px;
  right: 14%;
  z-index: 5;
  width: min(110px, 24vw);
  height: min(110px, 24vw);
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

/* Стул SVG */
.chair-svg {
  width: 100%;
  height: 100%;
  transition: transform 0.2s;
}

/* Анимация появления стула */
@keyframes chairAppear {
  from { transform: scale(0) rotate(-20deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg); opacity: 1; }
}
.chair-appear {
  animation: chairAppear 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

/* Прогресс бар "разбивания" */
#progress-wrap {
  position: absolute;
  bottom: 14px;
  right: 12%;
  width: min(110px, 24vw);
  height: 6px;
  background: rgba(255,255,255,0.15);
  border-radius: 3px;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.3s;
}
#progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff6b6b, #ffd700);
  border-radius: 3px;
  transition: width linear;
}

/* Анимации разбивания */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-4px) rotate(-2deg); }
  40% { transform: translateX(4px) rotate(2deg); }
  60% { transform: translateX(-3px) rotate(-1deg); }
  80% { transform: translateX(3px) rotate(1deg); }
}
@keyframes breakApart {
  0%   { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); }
  30%  { transform: scale(1.1) rotate(5deg); filter: brightness(2); }
  60%  { transform: scale(0.8) rotate(-10deg); opacity: 0.7; }
  100% { transform: scale(0) rotate(30deg) translateY(40px); opacity: 0; }
}
@keyframes splinter {
  0%   { transform: scale(1); opacity: 1; }
  20%  { transform: scale(1.2); filter: brightness(3); }
  100% { transform: scale(0) rotate(720deg) translateY(60px); opacity: 0; }
}
@keyframes collapse {
  0%   { transform: scaleY(1); }
  40%  { transform: scaleY(1.1) scaleX(0.9); }
  70%  { transform: scaleY(0.3) scaleX(1.3); }
  100% { transform: scaleY(0) scaleX(1.5); opacity: 0; }
}
@keyframes crumble {
  0%   { transform: rotate(0deg) scale(1); opacity: 1; }
  25%  { transform: rotate(-5deg) scale(1.05); }
  50%  { transform: rotate(8deg) scale(0.9); }
  75%  { transform: rotate(-3deg) scale(0.7); opacity: 0.5; }
  100% { transform: rotate(15deg) scale(0); opacity: 0; }
}
@keyframes spinCollapse {
  0%   { transform: rotate(0deg) scale(1); }
  50%  { transform: rotate(180deg) scale(1.2); }
  100% { transform: rotate(540deg) scale(0) translateY(30px); opacity: 0; }
}
@keyframes fold {
  0%   { transform: scaleX(1) scaleY(1); }
  50%  { transform: scaleX(0.1) scaleY(1.5); }
  100% { transform: scaleX(0) scaleY(0); opacity: 0; }
}

.break-apart { animation: breakApart 0.6s ease-in forwards; }
.splinter    { animation: splinter 0.5s ease-in forwards; }
.collapse    { animation: collapse 0.6s ease-in forwards; }
.crumble     { animation: crumble 0.7s ease-in forwards; }
.spin-collapse { animation: spinCollapse 0.8s ease-in forwards; }
.fold        { animation: fold 0.5s ease-in forwards; }

/* Частицы */
.particle {
  position: absolute;
  border-radius: 2px;
  pointer-events: none;
  animation: particleFly 0.7s ease-out forwards;
}
@keyframes particleFly {
  from { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
  to   { transform: var(--tx) var(--ty) rotate(var(--tr)) scale(0); opacity: 0; }
}

/* Коменты/эмодзи */
#reaction {
  position: absolute;
  font-size: 32px;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  pointer-events: none;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  animation: none;
}
@keyframes reactionPop {
  0%   { opacity: 0; transform: translateX(-50%) scale(0.5) translateY(0); }
  40%  { opacity: 1; transform: translateX(-50%) scale(1.2) translateY(-10px); }
  70%  { opacity: 1; transform: translateX(-50%) scale(1) translateY(-15px); }
  100% { opacity: 0; transform: translateX(-50%) scale(0.8) translateY(-30px); }
}
.reaction-anim {
  animation: reactionPop 1.5s ease-out forwards !important;
}

/* Кнопка */
#btn-give {
  width: 100%;
  max-width: 320px;
  padding: 16px 32px;
  font-size: 20px;
  font-weight: 900;
  color: #fff;
  background: linear-gradient(135deg, #7c3aed, #a855f7, #c084fc);
  border: none;
  border-radius: 20px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(139,92,246,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  letter-spacing: 0.5px;
}
#btn-give:active {
  transform: scale(0.96);
  box-shadow: 0 2px 8px rgba(139,92,246,0.4);
}
#btn-give:disabled {
  background: linear-gradient(135deg, #4a2070, #5a3080);
  opacity: 0.6;
  cursor: not-allowed;
}

/* Статус */
#status {
  color: rgba(255,255,255,0.7);
  font-size: 15px;
  text-align: center;
  min-height: 22px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* Combo */
#combo {
  position: absolute;
  top: 10px;
  right: 14px;
  color: #ffd700;
  font-size: 13px;
  font-weight: bold;
  text-shadow: 0 0 8px #ffd700;
  opacity: 0;
  transition: opacity 0.3s;
}

/* Record */
#record {
  color: rgba(255,215,0,0.6);
  font-size: 12px;
}
</style>
</head>

const STATES = {
  IDLE: 'idle',
  WAITING: 'waiting',
  BREAKING: 'breaking'
};

// === СОСТОЯНИЕ ===
let state = STATES.IDLE;
let score = 0;
let record = parseInt(localStorage.getItem('catChairRecord') || '0');
let breakTimer = null;
let progressTimer = null;
let currentChairIdx = 0;
let combo = 0;
let lastBreakTime = 0;

// Элементы
const scoreEl    = document.getElementById('score-count');
const statusEl   = document.getElementById('status');
const chairZone  = document.getElementById('chair-zone');
const btnGive    = document.getElementById('btn-give');
const progressWrap = document.getElementById('progress-wrap');
const progressBar  = document.getElementById('progress-bar');
const reactionEl   = document.getElementById('reaction');
const comboEl      = document.getElementById('combo');
const recordEl     = document.getElementById('record');

// === ГЕНЕРАЦИЯ ЗВЁЗД ===
(function genStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      animation-delay:${Math.random()*3}s;
      animation-duration:${1.5+Math.random()*2}s;
    `;
    c.appendChild(s);
  }
})();

// === ЗАПИСЬ ===
function updateRecord() {
  if (score > record) {
    record = score;
    localStorage.setItem('catChairRecord', record);
  }
  recordEl.textContent = record > 0 ? `🏆 ${record}` : '';
}

// === ПОКАЗАТЬ РЕАКЦИЮ ===
function showReaction(emoji) {
  reactionEl.textContent = emoji;
  reactionEl.classList.remove('reaction-anim');
  void reactionEl.offsetWidth;
  reactionEl.classList.add('reaction-anim');
}

// === СОЗДАТЬ ЧАСТИЦЫ ===
function spawnParticles(color) {
  const zone = chairZone;
  const colors = [color, '#fff', '#ffd700', '#ff6b6b'];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 8 + 4;
    const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.5;
    const dist = 40 + Math.random() * 60;
    const tx = `translateX(${Math.cos(angle)*dist}px)`;
    const ty = `translateY(${Math.sin(angle)*dist - 20}px)`;
    const tr = `${Math.random()*360}deg`;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:50%; top:50%;
      margin-left:-${size/2}px;
      margin-top:-${size/2}px;
      --tx:${tx}; --ty:${ty}; --tr:${tr};
      animation-duration:${0.5+Math.random()*0.4}s;
      animation-delay:${Math.random()*0.1}s;
      border-radius:${Math.random()>0.5?'2px':'50%'};
    `;
    zone.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

// === ДАТЬ СТУЛ ===
function giveChair() {
  if (state !== STATES.IDLE) return;

  state = STATES.WAITING;
  btnGive.disabled = true;

  // Выбираем стул
  currentChairIdx = Math.floor(Math.random() * CHAIRS.length);
  const chair = CHAIRS[currentChairIdx];

  // Рисуем стул
  chairZone.innerHTML = `
    <svg class="chair-svg chair-appear" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      ${chair.svg(chair)}
    </svg>
  `;

  // Время разбивания
  const [minT, maxT] = chair.breakTime;
  const breakDelay = (minT + Math.random() * (maxT - minT)) * 1000;

  // Прогресс бар
  progressWrap.style.opacity = '1';
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';
  setTimeout(() => {
    progressBar.style.transition = `width ${breakDelay/1000}s linear`;
    progressBar.style.width = '100%';
  }, 50);

  statusEl.textContent = `Котик получил ${chair.emoji} ${chair.name}... разбивает!`;

  // Дрожание перед ударом
  const shakeStart = breakDelay * 0.75;
  progressTimer = setTimeout(() => {
    const svg = chairZone.querySelector('svg');
    if (svg) svg.style.animation = 'shake 0.15s infinite';
    statusEl.textContent = `${chair.emoji} Котик готовится... 💪`;
  }, shakeStart);

  // Разбивание
  breakTimer = setTimeout(() => {
    breakChair(chair);
  }, breakDelay);
}

// === РАЗБИТЬ СТУЛ ===
function breakChair(chair) {
  state = STATES.BREAKING;
  progressWrap.style.opacity = '0';

  const svg = chairZone.querySelector('svg');
  if (svg) {
    svg.style.animation = '';
    svg.classList.add(chair.breakAnim);
  }

  // Частицы
  spawnParticles(chair.color);

  // Реакция
  const reactions = chair.reactions;
  showReaction(reactions[Math.floor(Math.random() * reactions.length)]);

  // Счёт
  score++;
  scoreEl.textContent = score;
  updateRecord();

  // Комбо
  const now = Date.now();
  if (now - lastBreakTime < 3000 && lastBreakTime > 0) {
    combo++;
    if (combo >= 2) {
      comboEl.textContent = `🔥 x${combo} COMBO!`;
      comboEl.style.opacity = '1';
    }
  } else {
    combo = 1;
    comboEl.style.opacity = '0';
  }
  lastBreakTime = now;

  statusEl.textContent = `💥 ${chair.name} разбит! +1`;

  // Сброс
  setTimeout(() => {
    chairZone.innerHTML = '';
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    state = STATES.IDLE;
    btnGive.disabled = false;
    statusEl.textContent = '😼 Дай ещё стул!';
    comboEl.style.opacity = '0';
  }, 800);
}

// === ТАЧ + МЫШЬ ===
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    giveChair();
  }
});

// Инициализация
updateRecord();
statusEl.textContent = '😺 Котику скучно, дай стул!';
</script>
